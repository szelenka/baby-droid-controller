<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950" role="img" aria-labelledby="title desc">
  <title id="title">Baby Droid Controller Wiring Diagram</title>
  <desc id="desc">Wiring diagram showing a Seeed Studio XIAO ESP32-C6 powered by a single-cell LiPo battery through an SPST switch, with eight momentary push buttons wired with internal pull-up resistors and two indicator LEDs with current-limiting resistors. The controller communicates with the chassis over ESP-NOW wireless protocol.</desc>

  <defs>
    <style>
      .title { font: 24px monospace; font-weight: 700; fill: #111827; }
      .label { font: 18px monospace; fill: #1f2937; }
      .small { font: 15px monospace; fill: #374151; }
      .pin { font: 16px monospace; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.5; rx: 10; ry: 10; }
      .railbat { stroke: #92400e; stroke-width: 6; fill: none; }
      .pwr3 { stroke: #2563eb; stroke-width: 4; fill: none; }
      .gnd { stroke: #111827; stroke-width: 6; fill: none; }
      .sig { stroke: #059669; stroke-width: 4; fill: none; }
      .led { stroke: #dc2626; stroke-width: 4; fill: none; }
      .dropg { stroke: #111827; stroke-width: 4; fill: none; }
      .dropbat { stroke: #92400e; stroke-width: 4; fill: none; }
      .drop3 { stroke: #2563eb; stroke-width: 4; fill: none; }
      .passive { fill: #ffffff; stroke: #6b7280; stroke-width: 2; }
      .dotg { fill: #111827; }
      .dotbat { fill: #92400e; }
      .dot3 { fill: #2563eb; }
      .dots { fill: #059669; }
      .dotled { fill: #dc2626; }
    </style>
  </defs>

  <text x="36" y="42" class="title">Baby Droid Controller Wiring Diagram</text>

  <!-- 1S LiPo Battery -->
  <rect x="40" y="80" width="200" height="100" class="box"/>
  <text x="70" y="118" class="label">1S LIPO BATTERY</text>
  <text x="84" y="150" class="small">3.7V nominal</text>
  <text x="92" y="170" class="small">4.2V full</text>
  <circle cx="240" cy="120" r="5.5" class="dotbat"/>
  <circle cx="120" cy="180" r="5.5" class="dotg"/>

  <!-- SPST Switch -->
  <rect x="300" y="90" width="170" height="70" class="box"/>
  <text x="332" y="130" class="label">SPST SWITCH</text>
  <line x1="240" y1="120" x2="320" y2="120" class="dropbat"/>
  <circle cx="320" cy="120" r="5.5" class="dotbat"/>
  <circle cx="356" cy="120" r="5.5" class="dotbat"/>
  <line x1="356" y1="120" x2="392" y2="102" class="dropbat"/>
  <line x1="410" y1="120" x2="530" y2="120" class="dropbat"/>
  <circle cx="410" cy="120" r="5.5" class="dotbat"/>
  <text x="430" y="108" class="small">switched BAT+</text>

  <!-- XIAO ESP32-C6 -->
  <rect x="530" y="80" width="360" height="700" class="box"/>
  <text x="610" y="118" class="label">XIAO ESP32-C6</text>

  <!-- Battery pads (underside) -->
  <text x="560" y="158" class="pin">BAT+</text>
  <circle cx="530" cy="153" r="5.5" class="dotbat"/>
  <text x="560" y="188" class="pin">BAT-</text>
  <circle cx="530" cy="183" r="5.5" class="dotg"/>

  <!-- Connect switch to BAT+ -->
  <line x1="530" y1="120" x2="530" y2="153" class="dropbat"/>

  <!-- 3V3 output -->
  <text x="560" y="228" class="pin">3V3</text>
  <circle cx="530" cy="223" r="5.5" class="dot3"/>
  <text x="560" y="258" class="pin">GND</text>
  <circle cx="530" cy="253" r="5.5" class="dotg"/>

  <!-- LED pins -->
  <text x="560" y="308" class="pin">D1 / GPIO22 (LED_POWER)</text>
  <circle cx="530" cy="303" r="5.5" class="dotled"/>
  <text x="560" y="338" class="pin">D2 / GPIO23 (LED_BUTTON)</text>
  <circle cx="530" cy="333" r="5.5" class="dotled"/>

  <!-- Button pins -->
  <text x="560" y="398" class="pin">D3 / GPIO15 (BTN2 Dome R)</text>
  <circle cx="890" cy="393" r="5.5" class="dots"/>
  <text x="560" y="428" class="pin">D4 / GPIO1  (BTN1 Dome L)</text>
  <circle cx="890" cy="423" r="5.5" class="dots"/>
  <text x="560" y="458" class="pin">D5 / GPIO2  (BTN3 Turn R)</text>
  <circle cx="890" cy="453" r="5.5" class="dots"/>
  <text x="560" y="488" class="pin">D6 / GPIO21 (BTN4 Turn L)</text>
  <circle cx="890" cy="483" r="5.5" class="dots"/>
  <text x="560" y="518" class="pin">D7 / GPIO17 (BTN5 Sound)</text>
  <circle cx="890" cy="513" r="5.5" class="dots"/>
  <text x="560" y="548" class="pin">D8 / GPIO19 (BTN8 Aux)</text>
  <circle cx="890" cy="543" r="5.5" class="dots"/>
  <text x="560" y="578" class="pin">D9 / GPIO20 (BTN6 Back)</text>
  <circle cx="890" cy="573" r="5.5" class="dots"/>
  <text x="560" y="608" class="pin">D10/ GPIO18 (BTN7 Fwd)</text>
  <circle cx="890" cy="603" r="5.5" class="dots"/>

  <!-- USB-C note -->
  <text x="610" y="700" class="label">USB-C</text>
  <text x="570" y="728" class="small">Programming &amp; charging</text>
  <text x="570" y="750" class="small">(charges LiPo when connected)</text>

  <!-- WiFi indicator -->
  <text x="610" y="660" class="label">ESP-NOW TX</text>

  <!-- LED section -->
  <!-- Power LED -->
  <line x1="530" y1="303" x2="470" y2="303" class="led"/>
  <line x1="470" y1="303" x2="470" y2="340" class="led"/>
  <rect x="458" y="340" width="24" height="20" class="passive"/>
  <text x="434" y="376" class="small">330R</text>
  <line x1="470" y1="360" x2="470" y2="390" class="led"/>
  <polygon points="462,390 478,390 470,406" style="fill:#dc2626; stroke:none;"/>
  <line x1="462" y1="406" x2="478" y2="406" style="stroke:#dc2626; stroke-width:2;"/>
  <text x="430" y="426" class="small">PWR</text>
  <text x="430" y="442" class="small">LED</text>
  <line x1="470" y1="406" x2="470" y2="900" class="dropg"/>
  <circle cx="470" cy="900" r="5.5" class="dotg"/>

  <!-- Button LED -->
  <line x1="530" y1="333" x2="440" y2="333" class="led"/>
  <line x1="440" y1="333" x2="440" y2="470" class="led"/>
  <rect x="428" y="470" width="24" height="20" class="passive"/>
  <text x="404" y="506" class="small">330R</text>
  <line x1="440" y1="490" x2="440" y2="520" class="led"/>
  <polygon points="432,520 448,520 440,536" style="fill:#dc2626; stroke:none;"/>
  <line x1="432" y1="536" x2="448" y2="536" style="stroke:#dc2626; stroke-width:2;"/>
  <text x="400" y="554" class="small">BTN</text>
  <text x="400" y="570" class="small">LED</text>
  <line x1="440" y1="536" x2="440" y2="900" class="dropg"/>
  <circle cx="440" cy="900" r="5.5" class="dotg"/>

  <!-- Internal pull-up indicator (one shown, applies to all) -->
  <line x1="530" y1="223" x2="490" y2="223" class="drop3"/>
  <line x1="490" y1="223" x2="490" y2="60" class="drop3"/>
  <line x1="490" y1="60" x2="950" y2="60" class="pwr3"/>
  <text x="960" y="55" class="small">3.3V (internal pull-up, all buttons)</text>
  <line x1="930" y1="60" x2="930" y2="393" class="drop3" stroke-dasharray="8,6"/>
  <circle cx="930" cy="60" r="5.5" class="dot3"/>
  <circle cx="930" cy="393" r="5.5" class="dots"/>

  <!-- Buttons -->
  <!-- BTN2 Dome R - D3 -->
  <rect x="980" y="370" width="200" height="50" class="box"/>
  <text x="1010" y="400" class="label">BTN2 (NO)</text>
  <line x1="890" y1="393" x2="980" y2="393" class="sig"/>
  <line x1="1180" y1="393" x2="1220" y2="393" class="dropg"/>
  <line x1="1220" y1="393" x2="1220" y2="900" class="dropg"/>
  <circle cx="1220" cy="900" r="5.5" class="dotg"/>

  <!-- BTN1 Dome L - D4 -->
  <rect x="980" y="400" width="200" height="50" class="box"/>
  <text x="1010" y="430" class="label">BTN1 (NO)</text>
  <line x1="890" y1="423" x2="980" y2="423" class="sig"/>
  <line x1="1180" y1="423" x2="1240" y2="423" class="dropg"/>
  <line x1="1240" y1="423" x2="1240" y2="900" class="dropg"/>
  <circle cx="1240" cy="900" r="5.5" class="dotg"/>

  <!-- BTN3 Turn R - D5 -->
  <rect x="980" y="430" width="200" height="50" class="box"/>
  <text x="1010" y="460" class="label">BTN3 (NO)</text>
  <line x1="890" y1="453" x2="980" y2="453" class="sig"/>
  <line x1="1180" y1="453" x2="1260" y2="453" class="dropg"/>
  <line x1="1260" y1="453" x2="1260" y2="900" class="dropg"/>
  <circle cx="1260" cy="900" r="5.5" class="dotg"/>

  <!-- BTN4 Turn L - D6 -->
  <rect x="980" y="460" width="200" height="50" class="box"/>
  <text x="1010" y="490" class="label">BTN4 (NO)</text>
  <line x1="890" y1="483" x2="980" y2="483" class="sig"/>
  <line x1="1180" y1="483" x2="1280" y2="483" class="dropg"/>
  <line x1="1280" y1="483" x2="1280" y2="900" class="dropg"/>
  <circle cx="1280" cy="900" r="5.5" class="dotg"/>

  <!-- BTN5 Sound - D7 -->
  <rect x="980" y="490" width="200" height="50" class="box"/>
  <text x="1010" y="520" class="label">BTN5 (NO)</text>
  <line x1="890" y1="513" x2="980" y2="513" class="sig"/>
  <line x1="1180" y1="513" x2="1300" y2="513" class="dropg"/>
  <line x1="1300" y1="513" x2="1300" y2="900" class="dropg"/>
  <circle cx="1300" cy="900" r="5.5" class="dotg"/>

  <!-- BTN8 Aux - D8 -->
  <rect x="980" y="520" width="200" height="50" class="box"/>
  <text x="1010" y="550" class="label">BTN8 (NO)</text>
  <line x1="890" y1="543" x2="980" y2="543" class="sig"/>
  <line x1="1180" y1="543" x2="1320" y2="543" class="dropg"/>
  <line x1="1320" y1="543" x2="1320" y2="900" class="dropg"/>
  <circle cx="1320" cy="900" r="5.5" class="dotg"/>

  <!-- BTN6 Back - D9 -->
  <rect x="980" y="550" width="200" height="50" class="box"/>
  <text x="1010" y="580" class="label">BTN6 (NO)</text>
  <line x1="890" y1="573" x2="980" y2="573" class="sig"/>
  <line x1="1180" y1="573" x2="1340" y2="573" class="dropg"/>
  <line x1="1340" y1="573" x2="1340" y2="900" class="dropg"/>
  <circle cx="1340" cy="900" r="5.5" class="dotg"/>

  <!-- BTN7 Fwd - D10 -->
  <rect x="980" y="580" width="200" height="50" class="box"/>
  <text x="1010" y="610" class="label">BTN7 (NO)</text>
  <line x1="890" y1="603" x2="980" y2="603" class="sig"/>
  <line x1="1180" y1="603" x2="1350" y2="603" class="dropg"/>
  <line x1="1350" y1="603" x2="1350" y2="900" class="dropg"/>
  <circle cx="1350" cy="900" r="5.5" class="dotg"/>

  <!-- Common ground rail at bottom -->
  <path d="M120 900 H1350" class="gnd"/>
  <text x="600" y="930" class="label">common ground rail</text>

  <!-- Battery GND to ground rail -->
  <line x1="120" y1="180" x2="120" y2="900" class="dropg"/>
  <circle cx="120" cy="900" r="5.5" class="dotg"/>

  <!-- XIAO BAT- to ground rail -->
  <line x1="530" y1="183" x2="500" y2="183" class="dropg"/>
  <line x1="500" y1="183" x2="500" y2="900" class="dropg"/>
  <circle cx="500" cy="900" r="5.5" class="dotg"/>

  <!-- XIAO GND to ground rail -->
  <line x1="530" y1="253" x2="510" y2="253" class="dropg"/>
  <line x1="510" y1="253" x2="510" y2="900" class="dropg"/>
  <circle cx="510" cy="900" r="5.5" class="dotg"/>
</svg>
